<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; max-width: 900px; }
input, button, select { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; }
button { background: #007bff; color: white; border: none; cursor: pointer; width: auto; }
button:disabled { background: #ccc; }
.section { border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 8px; }
.success { color: green; font-weight: bold; }
.error { color: red; font-weight: bold; }
.info { color: blue; }
video { max-width: 100%; margin: 10px 0; }
label { display: block; margin-top: 10px; font-weight: bold; }
.form-group { margin-bottom: 15px; }
h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; }
</style>
</head>
<body>



<!-- Upload -->
<div class="section">
<h2>1. Uploader la video</h2>
<div class="form-group">
    <label>Titre de la video:</label>
    <input type="text" id="title" placeholder="Entrer le titre" value="Test Video">
</div>
<div class="form-group">
    <label>Choisir le fichier :</label>
    <input type="file" id="videoFile" accept="video/*">
</div>
<button onclick="uploadVideo()"> Uploader </button>
<div id="uploadStatus" style="margin-top: 10px;"></div>
</div>

<!-- Traitement -->
<div class="section">
<h2>2. Traiter la video</h2>
<div class="form-group">
    <label> ID:</label>
    <input type="text" id="videoId" placeholder="Entrer l'id de la video" >
</div>

<div class="form-group">
    <label>Action:</label>
    <select id="action" onchange="updateActionParams()">
        <option value="trim">decouper</option>
        <option value="resize">Redimensionner </option>
        <option value="rotate">Faire tourner </option>
        <option value="crop">recadrer</option>
        <option value="thumbnail">Generer un thumnail</option>
        <option value="watermark">Ajouter un Watermark</option>
        <!-- <option value="concatenate">Concatener</option> -->
    </select>
</div>

<!-- Trim Parameters -->
<div id="trimParams" style="display: none;">
    <div class="form-group">
        <label>Debut (HH:MM:SS):</label>
        <input type="text" id="trimStart" placeholder="00:00:00" value="00:00:00">
    </div>
    <div class="form-group">
        <label>Fin (HH:MM:SS):</label>
        <input type="text" id="trimEnd" placeholder="00:01:00" value="00:00:10">
    </div>
</div>

<!-- Resize Parameters -->
<div id="resizeParams" style="display: none;">
    <div class="form-group">
        <label>Longueur (pixels):</label>
        <input type="number" id="resizeWidth" value="640" min="320" max="3840">
    </div>
    <div class="form-group">
        <label>Larguer (pixels):</label>
        <input type="number" id="resizeHeight" value="480" min="240" max="2160">
    </div>
</div>

<!-- Rotate Parameters -->
 <div id="rotateParam" style="display: none;">
    <div class="form-group">
        <label>angle (degrees) :</label>
        <input type="number" id="rotatedegree" value="90" min="0" max="360">
    </div>
</div>

<!-- Crop Parameters -->
 <div id="cropParams" style="display: none;">
    <div class="form-group">
        <label>Longueur :</label>
        <input type="number" id="cropwidth" value="640" min="320" max="3840">
    </div>
    <div class="form-group">
        <label>Largeur :</label>
        <input type="number" id="cropheight" value="480" min="240" max="2160">
    </div>
    <div class="form-group">
        <label>x (top):</label>
        <input type="number" id="cropx" value="0" min="0" max="3000">
    </div>
    <div class="form-group">
        <label>y (left):</label>
        <input type="number" id="cropy" value="0" min="0" max="3000">
    </div>
</div>

<!-- Thumbnail Parameters -->
 <div id="thumbnailParam" style="display: none;">
    <div class="form-group">
        <label>Temps (HH:MM:SS):</label>
        <input type="text" id="thumbnailtime" placeholder="00:00:01" value="00:00:01">
    </div>
</div>

<!-- Watermark Parameters -->
 <div id="watermarkParam" style="display: none;">
            <div class="form-group">
                <div>
                <label>image:</label>
                <input type="file" id="watermarkimage" accept="image/png">
                <button onclick="uploadImage()"> Uploader </button>
                </div>
                <input type="number" id="ImageID" readonly>
                <div id="uploadStatusim" style="margin-top: 10px;"></div>
                <label>Echelle</label>
                <input type="range" id="watermarkscale" min="5" max="50" value="15" step="1">
                <label>X</label>
                <input type="number" id="watermarkx" min="0" max="2000" value="500">
                <label>Y</label>
                <input type="number" id="watermarky" min="0" max="2000" value="500">
            </div>
</div>

<!-- Concatenate Parameters -->
 <!-- <div id="concatenateParam" style="display: none;">
    <div class="form-group">
    <label>Video ID:</label>
    <input type="text" id="id2" placeholder="Enter video ID " > -->
<!-- </div> -->
<!-- </div> -->


<button onclick="processVideo()">Traitement</button>
<div id="processStatus" style="margin-top: 10px;"></div>
</div>

<!-- Status Check Section -->
<div class="section">
<h2>3.Verifier le status</h2>
<div class="form-group">
    <label>Video ID:</label>
    <input type="text" id="statusVideoId" placeholder="Entrer l'id de la video">
</div>
<button onclick="checkStatus()">verifier le status</button>
<div id="statusResult" style="margin-top: 10px;"></div>
</div>

<script>
const BASE_URL = 'http://127.0.0.1:8000';

function updateActionParams() {
    const action = document.getElementById('action').value;
    document.getElementById('trimParams').style.display = action === 'trim' ? 'block' : 'none';
    document.getElementById('resizeParams').style.display = action === 'resize' ? 'block' : 'none';
    document.getElementById('rotateParam').style.display = action === 'rotate' ? 'block' : 'none';
    document.getElementById('cropParams').style.display = action === 'crop' ? 'block' : 'none';
    document.getElementById('thumbnailParam').style.display = action === 'thumbnail' ? 'block' : 'none';
    document.getElementById('watermarkParam').style.display = action === 'watermark' ? 'block' : 'none';
}

// Initialize
updateActionParams();

async function uploadVideo() {
    const file = document.getElementById('videoFile').files[0];
    if (!file) return alert("choisir une video");
    
    const formData = new FormData();
    formData.append('original', file);
    formData.append('titre', document.getElementById('title').value);
    
    const status = document.getElementById('uploadStatus');
    status.textContent = 'envoie...';
    status.className = 'info';
    
    try {
        const res = await fetch(`${BASE_URL}/prototype/video/upload/`, {
            method: 'POST',
            body: formData
        });
        
        const data = await res.json();
        if (res.ok) {
            document.getElementById('videoId').value = data.id;
            document.getElementById('statusVideoId').value = data.id;
            status.innerHTML = `<span class="succes"> Upload resussi! Video ID: ${data.id}</span>`;
        } else {
            status.innerHTML = `<span class="erreur">❌ Upload echoue: ${JSON.stringify(data)}</span>`;
        }
    } catch (e) {
        status.innerHTML = `<span class="erreur">❌ Erreur: ${e.message}</span>`;
    }
}

async function uploadImage() {
                const file = document.getElementById('watermarkimage').files[0];
                if (!file) return alert("choisir une image");

                const formData = new FormData();
                formData.append('image', file);
                const status = document.getElementById('uploadStatusim');
                status.textContent = 'envoie...';
                status.className = 'info';

                try {
                    const res = await fetch(`${BASE_URL}/prototype/watermark/upload/`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();
                    if (res.ok) {
                        document.getElementById('ImageID').value = data.id;
                        status.innerHTML = `<span class="succes"> Upload resussi! Video ID: ${data.id}</span>`;
                    } else {
                        status.innerHTML = `<span class="erreur">❌ Upload echoue: ${JSON.stringify(data)}</span>`;
                    }
                } catch (e) {
                    status.innerHTML = `<span class="erreur">❌ Erreur: ${e.message}</span>`;
                }
            }


async function processVideo() {
    const videoId = document.getElementById('videoId').value;
    if (!videoId) return alert("Please upload a video first");
    
    const action = document.getElementById('action').value;
    let params = {};
    
    if (action === 'trim') {
        params = {
            start: document.getElementById('trimStart').value,
            end: document.getElementById('trimEnd').value
        };
    } else if (action === 'resize') {
        params = {
            width: parseInt(document.getElementById('resizeWidth').value),
            height: parseInt(document.getElementById('resizeHeight').value)
        };
    }
    else if (action === 'rotate'){
        params ={
            degrees: parseInt(document.getElementById('rotatedegree').value)
        };
    }
    else if (action ==='crop'){
        params ={
            width: parseInt(document.getElementById('cropwidth').value),
            height: parseInt(document.getElementById('cropheight').value),
            x :parseInt(document.getElementById('cropx').value),
            y: parseInt(document.getElementById('cropy').value)
            
        };
    }
    else if (action==='concatenate'){
        params = {
            id2 : parseInt(document.getElementById('id2').value)
        }
    }
    
    else if (action === 'thumbnail'){
        params ={
            timestamp: document.getElementById('thumbnailtime').value,
        };

    }
    else if (action === 'watermark') {
                    params = {
                        id: parseInt(document.getElementById('ImageID').value),
                        scale: parseInt(document.getElementById('watermarkscale').value),
                        x: parseInt(document.getElementById('watermarkx').value),
                        y:parseInt(document.getElementById('watermarky').value),
                    }
                }

    
    const status = document.getElementById('processStatus');
    status.textContent = 'Processing... (this may take a few seconds)';
    status.className = 'info';
    
    try {
        const res = await fetch(`${BASE_URL}/prototype/video/processing/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                video_id: parseInt(videoId),
                action: action,
                params: params
            })
        });
        
        const data = await res.json();
        if (res.ok) {
            status.innerHTML = `<span class="success">✅ Processing started! Task ID: ${data.task_id}<br/>Status: ${data.status}<br/>Check the status below to see when it's done.</span>`;
            console.log("Processing response:", data);
        } else {
            status.innerHTML = `<span class="error">❌ Error: ${data.error || JSON.stringify(data)}</span>`;
        }
    } catch (e) {
        status.innerHTML = `<span class="error">❌ ${e.message}</span>`;
    }
}

async function checkStatus() {
    const videoId = document.getElementById('statusVideoId').value;
    if (!videoId) return alert("Enter a video ID");
    
    const status = document.getElementById('statusResult');
    status.textContent = 'Checking...';
    status.className = 'info';
    try{
        const res = await fetch(`${BASE_URL}/prototype/video/processing/status/${videoId}/`,{
            method : 'GET',
            headers: { 'Content-Type': 'application/json' },
        });

    const data = await res.json();
         if (res.ok) {
            status.textContent = 'Checkingyoyo...';
            if (data) {
                status.innerHTML = `<span class="info"><strong>Status:</strong> ${data.status}<br/><strong></span>`;
            } else {
                status.innerHTML = `<span class="error">Video not found</span>`;
            }
        }
    } catch (e) {
        status.innerHTML = `<span class="error">❌ ${e.message}</span>`;
    }

}
</script>
</body>
</html>
